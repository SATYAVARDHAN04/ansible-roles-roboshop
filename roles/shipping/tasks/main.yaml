- name: Installing maven and mysql module
  ansible.builtin.dnf:
    name: "{{ item }}"
    state: present
  loop:
    - maven
    - mysql

- name: install PyMySQL and cryptography dependecies
  ansible.builtin.pip:
    name: "{{ item }}"
    executable: pip3.9
  loop:
    - cryptography
    - PyMySQL

- name: app-setup
  include_role:
    name: common
    tasks_from: app-setup.yaml

- name: downloading the dependencies
  ansible.builtin.shell: mvn clean package
  args:
    chdir: /app

- name: rename jar file
  ansible.builtin.shell: mv target/shipping-1.0.jar shipping.jar
  args:
    chdir: /app

- name: Copying shipping service file
  ansible.builtin.template:
    src: shipping.service.j2
    dest: /etc/systemd/system/shipping.service

- name: shipping deamon reloading
  ansible.builtin.systemd:
    daemon-reload: true

- name: Starting and enabling shipping service
  ansible.builtin.service:
    name: shipping
    state: started
    enabled: yes

- name: import data into mysql
  tags:
    - import
  community.mysql.mysql_db:
    name: all
    login_user: root
    login_password: RoboShop@1
    login_host: "{{ MYSQL_HOST }}"
    state: import
    target: "{{ item }}"
  loop:
    - /app/db/schema.sql
    - /app/db/app-user.sql
    - /app/db/master-data.sql

- name: restart shipping
  tags:
    - import
  ansible.builtin.service:
    state: restarted
    name: shipping
